spring:
  application:
    name: weather-api
  profiles:
    active: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:weather-api}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

services:
  visual-crossing:
    weather-api.url: https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline
    api-key: ${VISUAL_CROSSING_API_KEY}

api.weather.rate-limit: 5
auth.jwt.secret-key: ${JWT_SECRET_KEY}

mail:
  weather-digest:
    cron: "0 0 8 * * FRI"
    from: ${MAIL_FROM}
